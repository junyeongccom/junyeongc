<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>할인 계산기</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f5f6fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 90%;
            max-width: 400px;
        }

        h2 {
            color: #1e6eff;
            margin-bottom: 20px;
        }

        form {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        input {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 10px;
            text-align: right;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: #1e6eff;
        }

        button {
            width: 100%;
            padding: 12px;
            font-size: 18px;
            color: white;
            background-color: #1e6eff;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 15px;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #1558cc;
        }

        #result {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
            color: #333;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>할인 계산기</h2>

        <form id="discountForm" action="/discount" method="POST">
            <label for="amount">금액을 입력하세요:</label>
            <input type="number" id="amount" name="amount" placeholder="금액 입력 (원)" required>
            <button type="submit">할인 적용</button>
        </form>

        <p id="result"></p>
    </div>

</body>
</html>
