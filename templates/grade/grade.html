<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학생 성적 입력</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #F0F8FF; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 5px 5px 15px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 350px;
            text-align: center;
        }
        h2 {
            text-align: center;
            color: #4A90E2;
        }
        label {
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
            color: #555;
            text-align: left;
        }
        input[type="text"], input[type="number"] {
            width: calc(100% - 16px);
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            outline: none;
            transition: all 0.3s ease-in-out;
            background-color: #F9F9F9;
        }
        input[type="text"]:focus, input[type="number"]:focus {
            border: 1px solid #4A90E2;
            background-color: #FFFFFF;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #6CB2EB;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s ease-in-out;
        }
        button:hover {
            background: #4A90E2; 
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>학생 성적 입력</h2>
        <form action="/grade" method="POST">
            <label for="name">학생 이름: </label>
            <input type="text" id="name" name="name" required>
            <label for="subject1">국어 점수: </label>
            <input type="number" id="korean" name="korean" min="0" max="100" required>
            <label for="subject5">영어 점수: </label>
            <input type="number" id="english" name="english" min="0" max="100" required>
            <label for="subject2">수학 점수: </label>
            <input type="number" id="math" name="math" min="0" max="100" required>
            <label for="subject3">사회 점수: </label>
            <input type="number" id="society" name="society" min="0" max="100" required>
            <label for="subject4">과학 점수: </label>
            <input type="number" id="science" name="science" min="0" max="100" required>
            <button type="submit">성적 확인</button>
        </form>
    </div>

    {{ render_html | default('') | safe }}
    
        <h1><a href='/grade'>🧐다시 계산하기🧐</a></h1>
        <h3><a href='/index'>홈으로</a></h3>
</body>
</html>
